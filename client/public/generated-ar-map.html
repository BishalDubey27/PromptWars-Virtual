<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VenueFlow AI Pro - Immersive Wayfinding</title>

                    "tertiary-dim": "#47a2f8",
                    "primary-dim": "#00e2ee",
                    "on-secondary-fixed": "#640059",
                    "surface-dim": "#0e0e14",
                    "primary-fixed": "#00f1fe",
                    "secondary": "#ff59e3",
                    "tertiary-container": "#4da8fe",
                    "surface-bright": "#2b2b35",
                    "on-tertiary": "#003258",
                    "outline": "#76747d",

            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .perspective-grid {
            perspective: 1000px;
            transform-style: preserve-3d;
        }
        .hologram-scan {
            background: linear-gradient(to bottom, transparent 0%, rgba(153, 247, 255, 0.1) 50%, transparent 100%);
            background-size: 100% 200%;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { background-position: 0% -100%; }
            100% { background-position: 0% 100%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 shadow-[0_10px_30px_-10px_rgba(0,242,255,0.15)] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-cyan-400 active:scale-95 duration-200 cursor-pointer">menu</span>
<span class="font-['Space_Grotesk'] tracking-tight text-xl font-bold tracking-tighter text-cyan-400">VenueFlow AI Pro</span>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8 text-slate-400 font-label text-sm uppercase tracking-widest">
<span class="hover:text-cyan-300 transition-colors cursor-pointer">Explore</span>
<span class="text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,255,0.5)] cursor-pointer">Wayfinding</span>
<span class="hover:text-cyan-300 transition-colors cursor-pointer">Live</span>
</div>
<div class="w-10 h-10 rounded-full border border-primary/20 p-0.5 overflow-hidden active:scale-95 duration-200">
<img alt="User Avatar" class="w-full h-full object-cover rounded-full" data-alt="High-detail futuristic digital avatar portrait of a modern user with subtle neon lighting highlights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDh4PwaroftYpYyElXjsbW335CdiDGwMy3Wd34oV-Y88YCKhBxgy8y2Glwda7oMmXkehUvcvfm9xkw6vIh1FsAk5Mo__nM3S85ckavOXOgBGfzACBcxAtyAZenvpZ3JnPbeVD10CTxVM58XC0FINOFttY7FPnowCr876S1sZpl-7GdBX2bn_4jCgIj4ZBIfTq6X1rvX6gryS2ljzr320OJ-rdoR6uQwXwjOdr-MkELBl7D03CstSMyxN4xgJMmuvNs0iezq34Bdes-7"/>
</div>
</div>
</nav>
<!-- Main Immersive Canvas -->
<main class="relative h-screen w-full overflow-hidden bg-surface-container-lowest">
<!-- 3D Stadium Wireframe Background -->
<div class="absolute inset-0 z-0 opacity-40">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&amp;w=2000')] bg-cover bg-center mix-blend-overlay" data-alt="Deep blue aerial view of a modern circular stadium architecture, high contrast with glowing structural lines"></div>
<div class="absolute inset-0 bg-gradient-to-b from-surface-container-lowest via-transparent to-surface-container-lowest"></div>
</div>
<!-- AR HUD Overlay -->
<div class="relative z-10 w-full h-full pt-16 flex flex-col">
<!-- Live Status HUD -->
<div class="p-6 flex flex-wrap justify-between items-start gap-4">
<div class="bg-surface-variant/40 backdrop-blur-xl border-l-2 border-primary p-4 rounded-r-xl shadow-2xl max-w-xs">
<div class="flex items-center gap-2 mb-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_10px_#99f7ff]"></div>
<span class="font-label text-xs text-primary uppercase tracking-[0.2em]">Live Wayfinding Active</span>
</div>
<h1 class="font-headline text-2xl font-bold text-on-surface leading-tight mb-1">Section 214</h1>
<p class="text-on-surface-variant text-sm font-medium">Row G • Seat 12</p>
<div class="mt-4 flex items-center justify-between text-xs font-label">
<span class="text-on-surface-variant">EST. ARRIVAL</span>
<span class="text-primary font-bold">2m 45s</span>
</div>
</div>
<div class="flex flex-col gap-2">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-high/60 backdrop-blur-md rounded-xl border border-outline-variant/30 text-on-surface hover:bg-surface-container-highest transition-all group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">add</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-high/60 backdrop-blur-md rounded-xl border border-outline-variant/30 text-on-surface hover:bg-surface-container-highest transition-all group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">remove</span>
</button>
</div>
</div>
<!-- Central AR Visualization Area -->
<div class="flex-grow relative perspective-grid">
<!-- Laser Path Visualization -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full max-w-4xl max-h-[530px]">
<svg class="w-full h-full drop-shadow-[0_0_25px_rgba(0,241,254,0.4)]" viewbox="0 0 1000 600">
<!-- Neon Wireframe Lines -->
<path d="M 100 500 L 900 500 L 800 100 L 200 100 Z" fill="none" opacity="0.3" stroke="#00f1fe" stroke-dasharray="4 8" stroke-width="1"></path>
<!-- Wayfinding Path -->
<path class="animate-[dash_5s_linear_infinite]" d="M 300 550 C 400 500, 450 450, 500 300 S 550 150, 750 120" fill="none" stroke="#ffbd2e" stroke-linecap="round" stroke-width="4" style="stroke-dasharray: 12 12;"></path>
<!-- User Marker -->
<circle class="shadow-lg shadow-primary/50" cx="300" cy="550" fill="#99f7ff" r="8"></circle>
<circle class="animate-ping" cx="300" cy="550" fill="none" r="16" stroke="#99f7ff" stroke-width="1"></circle>
<!-- Target Marker -->
<g transform="translate(750, 120)">
<path class="drop-shadow-[0_0_15px_#ff59e3]" d="M 0 -20 L 10 0 L 0 20 L -10 0 Z" fill="#ff59e3"></path>
<text class="font-headline text-lg font-bold" fill="#f6f2fc" text-anchor="middle" y="-35">YOUR SEAT</text>
</g>
</svg>
</div>
</div>
<!-- Bottom Floating Controls -->
<div class="p-8 mb-24 flex justify-center items-center gap-6">
<button class="px-8 py-3 bg-surface-container-high/60 backdrop-blur-xl border border-outline-variant/30 rounded-full flex items-center gap-3 text-on-surface-variant font-label tracking-widest text-xs hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined text-xl">layers</span>
                    TOGGLE HYPE ZONES
                </button>
<button class="px-8 py-3 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-label tracking-widest text-xs font-bold rounded-full shadow-[0_0_20px_rgba(153,247,255,0.4)] hover:shadow-[0_0_30px_rgba(153,247,255,0.6)] transition-all active:scale-95 flex items-center gap-3">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">directions</span>
                    START NAVIGATION
                </button>
</div>
</div>
<!-- Depth Scan Overlay Effect -->
<div class="absolute inset-0 pointer-events-none hologram-scan opacity-20"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-4 pb-8 px-2 bg-slate-950/90 backdrop-blur-2xl border-t border-white/5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] rounded-t-2xl">
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-all active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined mb-1">view_in_ar</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.1em] font-medium">Explore</span>
</div>
<div class="flex flex-col items-center justify-center text-cyan-400 drop-shadow-[0_0_10px_rgba(0,242,255,0.6)] scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">near_me</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.1em] font-medium">Wayfinding</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-all active:scale-90 duration-150 cursor-pointer relative">
<span class="material-symbols-outlined mb-1">sensors</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.1em] font-medium">Live</span>
<span class="absolute -top-1 -right-1 w-2 h-2 bg-secondary rounded-full"></span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-all active:scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.1em] font-medium">Profile</span>
</div>
</nav>
<style>
        @keyframes dash {
            to {
                stroke-dashoffset: -100;
            }
        }
    </style>
</body></html>
