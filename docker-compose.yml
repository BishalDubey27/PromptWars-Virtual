version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Note: Do not hardcode your GEMINI_API_KEY here for production. Pass it at runtime.
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
